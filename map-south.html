<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; }
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block;
      animation: repaint 0.1s 1s both;
    }
    @keyframes repaint {
      0% { opacity: 0.99; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <iframe 
    id="gmap"
    src="https://www.google.com/maps/d/u/0/embed?mid=1aoF-vx_b9Mjb1P0cO_QwHZ6F4ewC_FI&ehbc=2E312F&noprof=1"
    allowfullscreen>
  </iframe>
</body>
</html>
